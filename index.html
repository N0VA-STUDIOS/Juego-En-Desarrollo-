<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zombie Survival 2D</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ui">
        <!-- Menú Principal -->
        <div id="main-menu" class="menu-box">
            <h1>ZOMBIE SURVIVAL</h1>
            <button id="start-btn">JUGAR</button>
        </div>

        <!-- Menú de Pausa -->
        <div id="pause-menu" class="menu-box hidden">
            <h2>PAUSA</h2>
            <button id="resume-btn">CONTINUAR</button>
        </div>

        <!-- Pantalla de Game Over -->
        <div id="gameover-menu" class="menu-box hidden">
            <h2 style="color: #ff3333;">HAS MUERTO</h2>
            <button id="restart-btn">REINTENTAR</button>
        </div>

        <!-- HUD del juego -->
        <div id="hud" class="hidden">
            <div id="wave-txt">OLEADA: 1</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Carga secuencial compatible con Xbox Edge (Evita problemas de Módulos) -->
    <script src="js/input.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
